{% extends 'base.html' %}

{% block extra_title %}Delete Wishlist Item | ManaVault{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="mb-4">Delete Wishlist Item</h1>

    <div class="alert alert-warning">
        Are you sure you want to delete <strong>{{ wishlist_item.card_name }}</strong> from your wishlist?
    </div>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'wishlist' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
