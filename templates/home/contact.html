{% extends 'base.html' %}

{% block extra_title %}Contact | ManaVault{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="mb-4">Contact ManaVault</h1>
    <p class="mb-4">
        Have a question about card condition, stock availability, or an order? Send a message below.
    </p>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
